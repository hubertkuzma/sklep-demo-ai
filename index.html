<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklep Demo — AI Analityk</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent2: #7c6aff;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --text-dim: #3a3a50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--dim-border, rgba(0,229,160,0.03)) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 60px 1fr;
    height: 100vh;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .status-badge.connected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.08);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .api-input-wrap {
    position: relative;
  }

  .api-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent2); }
  .api-input::placeholder { color: var(--text-dim); }

  .connect-btn {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 8px;
    padding: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  .connect-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .connect-btn:active { transform: translateY(0); }

  /* DATA STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* QUICK PROMPTS */
  .quick-prompts {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .quick-prompts::-webkit-scrollbar { width: 4px; }
  .quick-prompts::-webkit-scrollbar-track { background: transparent; }
  .quick-prompts::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .prompt-chip {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s;
    line-height: 1.4;
  }

  .prompt-chip:hover {
    border-color: var(--accent2);
    background: rgba(124,106,255,0.08);
    color: var(--text);
    transform: translateX(3px);
  }

  .prompt-chip .chip-icon {
    font-size: 14px;
    margin-right: 6px;
  }

  /* MAIN CHAT */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px;
    gap: 16px;
  }

  .welcome-icon {
    font-size: 48px;
    filter: drop-shadow(0 0 20px rgba(0,229,160,0.4));
  }

  .welcome h2 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    max-width: 400px;
    line-height: 1.6;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .message.user .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
  }

  .message.ai .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
  }

  .message.user .msg-bubble {
    background: linear-gradient(135deg, rgba(124,106,255,0.2), rgba(0,229,160,0.1));
    border: 1px solid rgba(124,106,255,0.3);
    border-top-right-radius: 4px;
  }

  .message.ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg-bubble strong { color: var(--accent); }
  .msg-bubble em { color: var(--accent2); font-style: normal; }

  /* Insight cards inside AI messages */
  .insight-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
  }

  .insight-card .insight-title {
    font-weight: 700;
    color: var(--accent);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT BAR */
  .input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
  }

  .input-wrap:focus-within { border-color: var(--accent2); }

  .chat-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
  }

  .chat-input::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: rgba(255,107,107,0.15);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    z-index: 100;
    display: none;
  }

  .toast.show { display: block; animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Sklep Demo — AI Analityk
    </div>
    <div class="header-right">
      <span class="status-badge" id="statusBadge">⬤ Niepołączony</span>
    </div>
  </header>

  <aside class="sidebar">
    <!-- API KEY -->
    <div class="sidebar-section">
      <div class="sidebar-label">Klucz API</div>
      <div class="api-input-wrap">
        <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-..." />
      </div>
      <button class="connect-btn" onclick="connectAPI()">Połącz z Claude AI</button>
    </div>

    <!-- DATA STATS -->
    <div class="sidebar-section">
      <div class="sidebar-label">Twoje dane</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">2 000</div>
          <div class="stat-label">SKU</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">500</div>
          <div class="stat-label">Klientów</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">2 000</div>
          <div class="stat-label">Zamówień</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">350</div>
          <div class="stat-label">Koszyków</div>
        </div>
      </div>
    </div>

    <!-- QUICK PROMPTS -->
    <div class="quick-prompts">
      <div class="sidebar-label">Szybkie pytania</div>

      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">🏆</span>Jakie są nasze top 3 kategorie produktów i co je wyróżnia?
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">🛒</span>Przeanalizuj porzucone koszyki — gdzie tracimy najwięcej?
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">👥</span>Opisz profil naszego klienta VIP i jak do niego dotrzeć.
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">📈</span>Jakie działania zwiększyłyby sprzedaż w najbliższym kwartale?
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">💰</span>Oceń skuteczność rabatów — czy naprawdę pomagają?
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">📧</span>Jak poprawić wskaźnik odzysku porzuconych koszyków?
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">🗺️</span>Które miasta mają największy potencjał sprzedażowy?
      </button>
      <button class="prompt-chip" onclick="sendQuick(this)">
        <span class="chip-icon">⚠️</span>Jakie ryzyka biznesowe widzisz w naszych danych?
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="chat-window" id="chatWindow">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Twój AI Analityk</h2>
        <p>Wklej klucz API i zadaj pytanie o swój sklep. Analizuję dane z 2000 SKU, 500 klientów i 2000 zamówień.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea class="chat-input" id="chatInput"
          placeholder="Zapytaj o swoje dane... np. 'Jakie produkty najlepiej sprzedają się w Q4?'"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const SYSTEM_PROMPT = `Jesteś ekspertem analitykiem danych dla sklepu e-commerce "Sklep Demo". 
Masz dostęp do następujących danych (fikcyjnych, do celów edukacyjnych):

📦 PRODUKTY (2000 SKU):
- 8 kategorii: Elektronika (58% sprzedaży), Sport (16.8%), Dom i ogród, Odzież, Zabawki, Kosmetyki, Żywność, Książki
- Ceny: od 9 PLN (Żywność) do 3999 PLN (Elektronika)
- Marże: 35-65%
- Top produkt: FoodCraft Power bank Standard Szary (61 831 PLN przychodu)

👥 KLIENCI (500 osób):
- Segmenty: Okazjonalny 37.4%, Regularny 33.8%, Nowy 18.8%, VIP 10%
- Średnie CLV: 13 013 PLN
- Top klientka: Magdalena Zielińska (122 290 PLN, 33 zamówienia)
- Miasta: Kraków i Lublin na czele, potem Gdańsk, Poznań, Szczecin

🛒 ZAMÓWIENIA (2000):
- Łączna sprzedaż: 6 506 622 PLN
- Średnia wartość koszyka: 3 253 PLN
- Łączne rabaty: 332 845 PLN
- Metody płatności: Przelew 22.2%, Karta 20.1%, Za pobraniem 19.4%, PayPal 19.4%, BLIK 18.9%
- Trend: szczyt w 2023, spadek w 2024

📉 PORZUCONE KOSZYKI (350):
- Łączna utracona wartość: 387 847 PLN
- Średnia wartość koszyka: 1 108 PLN
- Wskaźnik odzysku: tylko 28.9%
- E-maile wysłane: 236 (z czego część odzyskana), bez maila: 114
- Kategoria z największymi stratami: Elektronika (120k PLN)

Odpowiadaj po polsku. Bądź konkretny, używaj liczb z danych. 
Formatuj odpowiedzi czytelnie — używaj emoji, pogrubień (**tekst**) i list.
Zawsze kończ konkretnymi rekomendacjami biznesowymi.
Maksymalnie 400 słów na odpowiedź.`;

let apiKey = '';
let isConnected = false;
let isLoading = false;
let conversationHistory = [];

function connectAPI() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || !key.startsWith('sk-ant')) {
    showToast('⚠️ Nieprawidłowy klucz API');
    return;
  }
  apiKey = key;
  isConnected = true;
  document.getElementById('statusBadge').textContent = '⬤ Połączono z Claude';
  document.getElementById('statusBadge').className = 'status-badge connected';
  document.getElementById('sendBtn').disabled = false;
  showWelcomeMessage();
}

function showWelcomeMessage() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  addMessage('ai', '✅ Połączono! Jestem Twoim AI Analitykiem. Znam Twój sklep na wylot — 2000 SKU, 500 klientów, 2000 zamówień i 350 porzuconych koszyków.\n\nO co chcesz zapytać? Możesz użyć gotowych pytań po lewej lub napisać własne.');
}

function sendQuick(btn) {
  const text = btn.innerText.replace(/^[^\w]+/, '').trim();
  document.getElementById('chatInput').value = text;
  sendMessage();
}

async function sendMessage() {
  if (!isConnected) { showToast('⚠️ Najpierw połącz się z API'); return; }
  if (isLoading) return;

  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);

  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const typingEl = addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    typingEl.remove();

    if (data.error) {
      showToast('❌ ' + data.error.message);
      conversationHistory.pop();
    } else {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    }
  } catch (err) {
    typingEl.remove();
    showToast('❌ Błąd połączenia z API');
    conversationHistory.pop();
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function addMessage(role, text) {
  const window = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  window.appendChild(div);
  window.scrollTop = window.scrollHeight;
  return div;
}

function addTyping() {
  const window = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'message ai';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  window.appendChild(div);
  window.scrollTop = window.scrollHeight;
  return div;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.className = 'toast', 3000);
}
</script>
</body>
</html>
